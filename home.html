<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker Homepage</title>
    <!-- Google Font Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind and Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;

        }
    </style>
</head>

<body class="bg-[#F8FAFC] min-h-screen">

    <!-- Nav Section -->
    <nav class="">
        <div class="navbar bg-base-100 shadow-sm px-4 md:px-20">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl gap-2">
                    <img class="w-[30px]" src="./assets/github-logo.png" alt="">
                    <span class="hidden sm:inline">GitHub Issues Tracker</span></a>
            </div>
            <div class="flex gap-2">
                <div><label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="input-search" type="search" required placeholder="Search Issues..." />
                    </label></div>
                <button class="btn btn-primary">+New Issue</button>
            </div>
        </div>
    </nav>

    <!-- Filter Section -->
    <section class="mt-15 w-8/12 mx-auto ">
        <div class=" bg-white p-6 rounded-lg flex-wrap flex gap-3">
            <button onclick="filterIssues('all', this)" class="btn filter-btn btn-primary w-25">All</button>
            <button onclick="filterIssues('open', this)" class="btn filter-btn btn-soft w-25">Open</button>
            <button onclick="filterIssues('closed', this)" class="btn filter-btn btn-soft w-25">Closed</button>
        </div>
    </section>

    <!-- Issue Section -->
    <section class="w-8/12 mx-auto mt-3 bg-white rounded-xl">
        <div class="flex flex-col md:flex-row md:justify-between items-center p-6">

            <div class="flex flex-col md:flex-row gap-3">
                <div class="flex items-center justify-center bg-[#ECE4FF] w-12 h-12 rounded-full p-2">
                    <img src="./assets/Aperture.png" alt="">
                </div>

                <div>
                    <h3 class="text-2xl font-bold"><span id="total-issue">50</span> Issues</h3>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-5">
                <p class="flex items-center gap-2"><span class="bg-green-600 w-3 h-3 rounded-full"></span>Open</p>
                <p class="flex items-center gap-2"><span class="bg-violet-600 w-3 h-3 rounded-full"></span>Closed</p>
            </div>

        </div>
    </section>

    <!-- Issue Card Section -->
    <section class="w-8/12 mx-auto bg-[#FBFBFB]">
        <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 p-7 gap-5"></div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="modal-container"></div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="./main.js"></script>
</body>

</html>
